services:
  db:
    image: postgres:16-alpine
    container_name: sibec-db
    environment:
      POSTGRES_DB: sibec
      POSTGRES_USER: sibec
      POSTGRES_PASSWORD: sibec
    ports:
      - "5432:5432"
    volumes:
      - sibec_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sibec -d sibec"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: sibec-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "False"
      SECRET_KEY: "sibec-prototype-secret-key"
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
      DATABASE_URL: "postgresql://sibec:sibec@db:5432/sibec"
      CORS_ALLOWED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      CSRF_TRUSTED_ORIGINS: "http://localhost:8080,http://127.0.0.1:8080"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_SSL_REDIRECT: "False"
      SECURE_HSTS_SECONDS: "0"
      SECURE_HSTS_INCLUDE_SUBDOMAINS: "False"
      SECURE_HSTS_PRELOAD: "False"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_initial_data &&
             python manage.py seed_operational_data &&
             gunicorn config.wsgi --bind 0.0.0.0:8000 --workers 3 --threads 2 --timeout 120 --log-file -"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz/', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    container_name: sibec-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  sibec_pg_data:
